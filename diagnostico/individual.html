<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Resultado individual | Estadistica 10</title><link rel="stylesheet" href="../assets/style.css"><link rel="stylesheet" href="assets/diagnostico.css"><script src="data/resultados.js"></script></head><body><main class="page"><header class="hero no-logo"><div class="hero-text"><p class="kicker">Estadistica 10 - Consulta individual</p><h1>Resultado individual</h1><p>Consulta del resultado mediante grupo y codigo personal.</p></div></header><section class="layout"><aside class="sidebar"><div class="sidebar-title">Diagnostico</div><ul class="nav-list"><li><a href="index.html">Resumen</a></li><li><a href="resultados.html">Resultados globales</a></li><li><a href="docente.html">Panel docente</a></li><li><a href="solucion.html">Solucion en video</a></li></ul></aside><div class="card-grid"><article class="card full"><h2>Consulta</h2><div class="form-grid"><label>Grupo<select id="studentGroup"><option value="10A">10A</option><option value="10B">10B</option><option value="10C">10C</option></select></label><label>Codigo personal<input id="studentCode" type="password" placeholder="Codigo"></label><label>&nbsp;<button class="button" onclick="lookupStudent()" style="border:0">Consultar</button></label></div></article><article class="card full" id="studentResult"><h2>Resultado</h2><p>Ingresa los datos para consultar el resultado individual.</p></article></div></section></main><script>function lookupStudent(){const group=document.getElementById("studentGroup").value;const code=document.getElementById("studentCode").value.trim();const result=INDIVIDUAL_RESULTS[group][code];const box=document.getElementById("studentResult");if(!code){box.innerHTML="<h2>Resultado</h2><p>Debes ingresar el codigo.</p>";return;}if(!result){box.innerHTML=`<h2>Resultado no disponible</h2><p>No se encontro un resultado cargado para el grupo ${group}.</p><div class="private-note">Los resultados individuales se cargaran despues de aplicar y revisar la prueba diagnostica.</div>`;return;}box.innerHTML=`<h2>${result.name||"Estudiante"}</h2><div class="diagnostic-summary"><div class="metric"><strong>${result.score}/15</strong><span>puntaje</span></div><div class="metric"><strong>${result.percent}%</strong><span>porcentaje</span></div><div class="metric"><strong>${group}</strong><span>grupo</span></div></div><p><strong>Retroalimentacion:</strong> ${result.feedback||"Pendiente."}</p>`;}</script></body></html>

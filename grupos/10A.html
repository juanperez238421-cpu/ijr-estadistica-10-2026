<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Grupo 10°A | Estadística 10°</title><link rel="stylesheet" href="../assets/style.css"></head><body><section id="login" class="page"><article class="card"><p class="kicker">Estadística 10° · Grupo 10°A</p><h2>Acceso por grupo</h2><p>Ingresa la clave del grupo 10°A.</p><input id="password" type="password" placeholder="Clave 10°A" style="width:100%;padding:11px;border:1px solid #d8dee4;border-radius:10px"><div class="button-row"><button class="button" onclick="checkAccess()" style="border:0">Entrar</button></div><p id="error"></p></article></section><main id="content" class="page" style="display:none"><header class="hero no-logo"><div class="hero-text"><p class="kicker">Estadística 10° · Grupo 10°A</p><h1>Grupo 10°A</h1><p>Espacio específico para recordatorios, actividades y recursos del grupo 10°A.</p></div></header><section class="card-grid" style="margin-top:34px"><article class="card full"><h2>Estado actual</h2><p>Contenido específico pendiente por publicar.</p><div class="button-row"><a class="button" href="../index.html">Volver al curso</a></div></article></section></main><script>const GROUP_PASSWORD="est10A-2026";const ACCESS_KEY="ijr-est-10A-access";function checkAccess(){const input=document.getElementById("password").value.trim();if(input===GROUP_PASSWORD){localStorage.setItem(ACCESS_KEY,"ok");document.getElementById("login").style.display="none";document.getElementById("content").style.display="block";}else{document.getElementById("error").textContent="Clave incorrecta. Verifica con el docente.";}}window.onload=()=>{if(localStorage.getItem(ACCESS_KEY)==="ok"){document.getElementById("login").style.display="none";document.getElementById("content").style.display="block";}};</script></body></html>
